<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contact Form</title>

  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- Success Toast -->
  <div
    class="toast hidden"
    id="successToast"
    role="alert"
    aria-live="assertive"
  >
    Message sent successfully!
  </div>

  <main class="container">
    <form id="contactForm" novalidate>

      <h1>Contact Us</h1>

      <!-- Name Row -->
      <div class="row">
        <div class="form-group">
          <label for="firstName">
            First Name <span>*</span>
          </label>

          <input
            type="text"
            id="firstName"
            name="firstName"
            required
            aria-describedby="firstNameError"
          />

          <small class="error" id="firstNameError"></small>
        </div>

        <div class="form-group">
          <label for="lastName">
            Last Name <span>*</span>
          </label>

          <input
            type="text"
            id="lastName"
            name="lastName"
            required
            aria-describedby="lastNameError"
          />

          <small class="error" id="lastNameError"></small>
        </div>
      </div>

      <!-- Email -->
      <div class="form-group">
        <label for="email">
          Email Address <span>*</span>
        </label>

        <input
          type="email"
          id="email"
          name="email"
          required
          aria-describedby="emailError"
        />

        <small class="error" id="emailError"></small>
      </div>

      <!-- Query Type -->
      <fieldset class="form-group">
        <legend>Query Type <span>*</span></legend>

        <div class="radio-group">

          <label class="radio-card">
            <input
              type="radio"
              name="query"
              value="general"
              required
            />
            General Enquiry
          </label>

          <label class="radio-card">
            <input
              type="radio"
              name="query"
              value="support"
            />
            Support Request
          </label>

        </div>

        <small class="error" id="queryError"></small>
      </fieldset>

      <!-- Message -->
      <div class="form-group">
        <label for="message">
          Message <span>*</span>
        </label>

        <textarea
          id="message"
          name="message"
          rows="5"
          required
          aria-describedby="messageError"
        ></textarea>

        <small class="error" id="messageError"></small>
      </div>

      <!-- Consent -->
      <div class="checkbox-group">
        <input
          type="checkbox"
          id="consent"
          required
          aria-describedby="consentError"
        />

        <label for="consent">
          I consent to being contacted by the team *
        </label>
      </div>

      <small class="error" id="consentError"></small>

      <!-- Submit -->
      <button type="submit">
        Submit
      </button>

    </form>
  </main>

  <script src="script.js"></script>
</body>
</html>
