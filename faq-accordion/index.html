<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FAQ Accordion</title>

  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <main class="container">
    <section class="faq-card">

      <div class="faq-header">
        <img src="./assets/images/icon-star.svg" alt="" />
        <h1>FAQs</h1>
      </div>

      <div class="faq-item">
        <button class="faq-question" aria-expanded="false">
          <span>What is Frontend Mentor, and how will it help me?</span>

          <img
            class="icon"
            src="./assets/images/icon-plus.svg"
            alt=""
          />
        </button>

        <div class="faq-answer">
          <p>
            Frontend Mentor offers realistic coding challenges to help developers improve their frontend coding skills with projects in HTML, CSS, and JavaScript.
          </p>
        </div>
      </div>

      <div class="faq-item">
        <button class="faq-question" aria-expanded="false">
          <span>Is Frontend Mentor free?</span>

          <img
            class="icon"
            src="./assets/images/icon-plus.svg"
            alt=""
          />
        </button>

        <div class="faq-answer">
          <p>
            Yes, Frontend Mentor offers both free and premium coding challenges.
          </p>
        </div>
      </div>

    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
